name: scales_mobile
description: "Singer-facing mobile app for the Scales karaoke platform."
publish_to: 'none'

version: 0.2.5+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.3

  # Networking
  dio: ^5.9.2
  web_socket_channel: ^3.0.3

  # Local storage & utilities
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8

  # QR codes
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Image picker for profile
  image_picker: ^1.1.2
  flutter_stripe: ^12.6.0

  # Push notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^21.0.0

  # Time formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
